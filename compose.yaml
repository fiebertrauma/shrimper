services:
  shrimper:
    build: .
    container_name: shrimper
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      TRUST_PROXY: 1
      API_RATE_LIMIT_WINDOW_MS: 60000
      API_RATE_LIMIT_MAX: 30
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
